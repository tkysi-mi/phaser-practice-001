<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>スーパーおつかいクエスト</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --text: #e5e7eb;
        --sub: #9ca3af;
        --ok: #16a34a;
        --ng: #dc2626;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 18px;
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.14), transparent 34%),
          linear-gradient(180deg, #081121 0%, #0f172a 48%, #111827 100%);
        color: var(--text);
        font-family: "Segoe UI", "Hiragino Sans", sans-serif;
      }

      .frame {
        width: min(100%, 1280px);
        margin: 0 auto;
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(2, 6, 23, 0.92));
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 22px;
        padding: 20px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      }

      h1 {
        margin: 0 0 8px;
        color: #f8fafc;
        font-size: 1.45rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      p {
        margin: 0 0 12px;
        color: #cbd5e1;
        font-size: 0.98rem;
        line-height: 1.65;
      }

      .meta-bar {
        display: grid;
        grid-template-columns: minmax(200px, 0.85fr) minmax(0, 1.8fr);
        gap: 14px;
        margin: 0 0 16px;
      }

      .meta-card {
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.94), rgba(2, 6, 23, 0.88));
        border: 1px solid rgba(96, 165, 250, 0.16);
        border-radius: 14px;
        padding: 12px 14px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .meta-label {
        margin: 0 0 6px;
        color: #7dd3fc;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .meta-value {
        margin: 0;
        color: #f8fafc;
        font-size: 1.16rem;
        font-weight: 700;
      }

      .meta-subvalue {
        margin: 0;
        color: #dbeafe;
        font-size: 1rem;
        font-weight: 500;
        line-height: 1.5;
      }

      #game {
        width: min(100%, calc((100vh - 132px) * 16 / 9));
        aspect-ratio: 16 / 9;
        margin: 0 auto;
        border: 1px solid rgba(96, 165, 250, 0.18);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
      }

      #game canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      @media (max-width: 960px) {
        body {
          padding: 10px;
        }

        .frame {
          padding: 14px;
          border-radius: 16px;
        }

        h1 {
          font-size: 1.2rem;
        }

        .meta-bar {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <h1>スーパーおつかいクエスト</h1>
      <p>スーパー内を移動して店員に英語で聞き込みし、制限時間5分で必要な食材を集めます。</p>
      <section class="meta-bar">
        <div class="meta-card">
          <p class="meta-label">時間</p>
          <p class="meta-value" id="hud-dish-time">時間: 5:00</p>
        </div>
        <div class="meta-card">
          <p class="meta-label">タスク</p>
          <p class="meta-subvalue" id="hud-task">タスク: 料理に必要な食材を集めよう</p>
        </div>
      </section>
      <div id="game"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script type="module" src="./src/game.js"></script>
  </body>
</html>
